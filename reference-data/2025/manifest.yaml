validation:
  status: "source-only"
  parity_claim: false
  source_only: true
  notes:
    - "This is a conservative example manifest, not a validated parity record."
    - "The Tier 2 version is recorded as an explicit reconciliation gap."

gaps:
  - gap_id: "2025-nec-constant-not-modeled"
    kind: "value_unpublished"
    scope: "constants.nec"
    reason: "The repository does not model a 2025 NEC constant bundle, so NEC is intentionally left null."
    expected_resolution: "Add a source-backed NEC25 constant bundle or keep this gap open."
    introduced_at: "2026-05-12"
    status: "open"
  - gap_id: "2025-price-weights-not-extracted"
    kind: "validation_blocked"
    scope: "parameters.weights"
    reason: "Standalone price-weight tables are referenced by the official page but are not separately extracted into this example."
    expected_resolution: "Extract the linked price-weight workbook into a typed parameter bundle and attach fixture parity evidence."
    introduced_at: "2026-05-12"
    status: "open"
  - gap_id: "2025-adjustments-not-materialized"
    kind: "validation_blocked"
    scope: "parameters.adjustments"
    reason: "Adjustment tables are not individually materialized in this example."
    expected_resolution: "Extract adjustment parameters from the NEP determination or technical specification into versioned records."
    introduced_at: "2026-05-12"
    status: "open"
  - gap_id: "2025-tier-2-version-reconciliation"
    kind: "validation_blocked"
    scope: "coding_sets.Tier 2"
    reason: "Tier 2 versioning is inconsistent between the repo helper and the official 2025-26 NEP page and must be reconciled before validation."
    expected_resolution: "Resolve the authoritative Tier 2 version for 2025-26 and update classification validation fixtures."
    introduced_at: "2026-05-12"
    status: "open"
