extends: existence
message: Use a precise calculator/year claim with supporting evidence instead of a broad validation statement.
level: warning
ignorecase: true
tokens:
  - '\bfully\s+validated\b'
  - '\bcompletely\s+validated\b'
  - '\bcomplete\s+validation\b'
  - '\bproject[-\s]+wide\s+validation\b'
  - '\brepo[-\s]+wide\s+validation\b'
  - '\bend[-\s]+to[-\s]+end\s+validation\b'
  - '\ball\s+calculators\b'
  - '\ball\s+years\b'
  - '\ball\s+years\s+validated\b'
  - '\ball\s+years\s+supported\b'
  - '\bsupports\s+\d{4}\b'
  - '\bvalidated\s+across\s+the\s+board\b'
  - '\bvalidated\s+for\s+all\s+years\b'
  - '\bvalidated\s+against\s+official\s+SAS\s+results\b'
  - '\bmatches\s+the\s+official\s+SAS\s+results\b'
