repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format --check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: ruff-docstrings
        name: ruff docstring checks
        entry: uv run ruff check --select D2 --extend-exclude tests --extend-exclude helpers nwau_py excel_calculator/src
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --manifest-path rust/Cargo.toml --all --check
        language: system
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: cargo test --manifest-path rust/Cargo.toml
        language: system
        pass_filenames: false
      - id: vale
        name: vale docs
        entry: uv run --with vale vale conductor README.md docs
        language: system
        pass_filenames: false
