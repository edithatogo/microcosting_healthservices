[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nwau_py"
version = "0.1.0"
description = "IHACPA funding calculation utilities"
authors = [{name="IHACPA"}]
readme = "nwau_py/README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "pyxlsb",
    "pyreadstat",
    "lightgbm",
]

[project.scripts]
funding-calculator = "excel_calculator.src.funding_calculator:main"

[tool.setuptools.packages.find]
where = [".", "excel_calculator/src"]

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = ["archive/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = []

