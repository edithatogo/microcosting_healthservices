[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nwau_py"
version = "0.1.0"
description = "IHACPA funding calculation utilities"
authors = [{name="IHACPA"}]
readme = "nwau_py/README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "pyxlsb",
]

[project.scripts]
funding-calculator = "nwau_py.funding_calculator:main"

