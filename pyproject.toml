[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nwau_py"
version = "0.2.0"
description = "Utilities for calculating IHACPA National Weighted Activity Units"
authors = [{name="IHACPA"}]
readme = "nwau_py/README.md"
license = {file = "LICENSE"}
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "pyxlsb",
    "pyreadstat",
    "lightgbm",
]

[project.optional-dependencies]
dev = ["mypy"]

[project.scripts]
funding-calculator = "excel_calculator.src.funding_calculator:main"

[tool.setuptools.packages.find]
where = [".", "excel_calculator/src"]

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = ["archive/*", "tests/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests", "excel_calculator/tests"]

