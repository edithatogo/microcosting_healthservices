name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate release tag and package version metadata
        run: uv run python .github/scripts/validate_release_metadata.py

      - name: Build release artifacts
        run: |
          uv build

      - name: Generate artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No distributable artifacts found in dist/ to checksum."
            exit 1
          fi
          sha256sum "${artifacts[@]}" > dist/checksums.txt

      - name: Upload source distribution
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
