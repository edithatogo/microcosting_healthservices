name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate release tag and package version metadata
        run: uv run python .github/scripts/validate_release_metadata.py

      - name: Verify signed tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Verifying tag: ${TAG}"
          if git verify-tag "${TAG}" 2>/dev/null; then
            echo "Tag signature verified successfully"
          else
            echo "WARNING: Tag is not signed. Consider signing tags for GA releases."
          fi

      - name: Build release artifacts
        run: |
          uv build

      - name: Validate MCP package artifacts
        run: uv run python .github/scripts/validate_mcp_package_artifacts.py

      - name: Generate SBOM (CycloneDX)
        run: |
          uv run python - <<'PY'
          import json
          import pathlib
          import tomllib

          version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          payload = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "version": 1,
              "metadata": {
                  "component": {
                      "name": "nwau_py",
                      "version": version,
                      "type": "library",
                  }
              },
          }
          pathlib.Path("dist/sbom.cdx.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Generate artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip dist/*.json)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No distributable artifacts found in dist/ to checksum."
            exit 1
          fi
          sha256sum "${artifacts[@]}" > dist/checksums.txt

      - name: Validate distributable filenames
        run: |
          set -euo pipefail
          project_version="$(uv run python - <<'PY'
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )"
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No release artifacts found in dist/."
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            if [[ "${artifact}" != *"${project_version}"* ]]; then
              echo "Artifact filename does not include project version ${project_version}: ${artifact}"
              exit 1
            fi
          done
          echo "All distributable artifacts include project version ${project_version}."

      - name: Generate SLSA build attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
