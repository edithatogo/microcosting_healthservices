name: Publish Python package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to validate and publish
        required: false

permissions:
  contents: read
  actions: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_REF_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
      RELEASE_REF_TYPE: tag
    steps:
      - name: Check out repository at tagged ref
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Check out repository
        if: github.event_name != 'release'
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate release tag and package version metadata
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
          RELEASE_REF_TYPE: tag
        run: uv run python .github/scripts/validate_release_metadata.py

      - name: Download release artifacts
        if: github.event_name == 'release'
        run: |
          gh release download "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact attestations
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No release artifacts available for attestation verification."
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            gh attestation verify "$artifact" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --source-ref "${{ github.event.release.tag_name }}" \
              --source-digest "${{ github.sha }}"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distribution artifacts
        if: github.event_name != 'release'
        run: uv build

      - name: Generate artifact checksums for manual publish path
        if: github.event_name != 'release'
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No distributable artifacts found in dist/ for manual publish."
            exit 1
          fi
          sha256sum "${artifacts[@]}" > dist/checksums.txt

      - name: Verify release artifact checksums
        run: |
          find dist -maxdepth 1 -type f -printf '%f\n' > dist/files.txt
          awk '/^(checksums\.txt|.*\.whl|.*\.tar\.gz|.*\.zip)$/ {next} {print}' dist/files.txt | tee dist/unexpected-files.txt
          test ! -s dist/unexpected-files.txt || {
            echo "Unexpected files in dist/ for publish:"
            cat dist/unexpected-files.txt
            exit 1
          }
          test -f dist/checksums.txt || {
            echo "Missing dist/checksums.txt; cannot verify released artifacts."
            exit 1
          }
          awk '
            NF == 2 || NF == 3 {
              file = $(NF)
              if (file !~ /(\\.whl|\\.tar\\.gz|\\.zip)$/ && file != "checksums.txt") {
                print "Invalid artifact in checksums manifest: " file
                bad = 1
                next
              }
              if (file == "checksums.txt") next
              cmd = "test -f dist/" file
              if (system(cmd) != 0) {
                print "Checksummed file missing: " file
                bad = 1
              }
            }
            END { exit bad }
          ' dist/checksums.txt
          test $? -eq 0 || {
            echo "Invalid checksums manifest entries."
            exit 1
          }
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz dist/*.zip)
          artifact_count=${#artifacts[@]}
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No distributable artifacts found in dist/ after release download/build."
            exit 1
          fi
          checksum_count="$(awk 'NF == 2 || NF == 3 {
            file = $(NF)
            if (file ~ /(\\.whl|\\.tar\\.gz|\\.zip)$/) print file
          }' dist/checksums.txt | sort -u | wc -l | tr -d ' ')"
          for artifact in "${artifacts[@]}"; do
            base="$(basename "${artifact}")"
            if ! awk -v file="${base}" '{
              if (NF == 2 || NF == 3) {
                if ($(NF) == file) found=1
              }
            } END { exit !found }' dist/checksums.txt > /dev/null; then
              echo "Artifact not listed in checksums: ${base}"
              exit 1
            fi
          done
          if [ "${checksum_count}" -ne "${artifact_count}" ]; then
            echo "Mismatch between number of checksummed artifacts (${checksum_count}) and dist artifacts (${artifact_count})."
            exit 1
          fi
          sha256sum --check dist/checksums.txt
          echo "Artifact checksums verified."

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
