name: Docs Site

on:
  push:
    branches: [master]
    tags:
      - "v*"
    tags:
      - "v*"
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
      - "conductor/**"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
      - "conductor/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Link check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run linkcheck

  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: linkcheck
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Set GitHub Pages metadata
        run: |
          echo "SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          echo "SITE_BASE=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist
      - uses: actions/deploy-pages@v4
