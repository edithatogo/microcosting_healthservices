name: Power Platform ALM

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify track scaffold files
        run: |
          test -f conductor/tracks/power_platform_alm_app_20260510/spec.md
          test -f conductor/tracks/power_platform_alm_app_20260510/plan.md
          test -f conductor/tracks/power_platform_alm_app_20260510/index.md
          test -f power-platform/solution/README.md
          test -f power-platform/solution/solution-manifest.md
          test -f power-platform/solution/environment-variables.md
          test -f power-platform/solution/connection-references.md
          test -f power-platform/solution/alm-workflow.md
          test -f power-platform/solution/app-surface.md
          test -f power-platform/connectors/service-boundary-contract.md

      - name: Syntax check bootstrap scripts
        run: |
          bash -n scripts/bootstrap-power-platform-alm.sh
          bash -n scripts/bootstrap-power-platform-powerbi-cli.sh

      - name: Run track tests
        run: |
          python -m pytest -q \
            tests/test_power_platform_alm_app_track.py \
            tests/test_power_bi_cli_tooling_track.py \
            tests/test_tracks_registry.py
