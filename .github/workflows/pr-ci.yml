name: PR CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Phase 1 quality checks (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group dev --group typing

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Run type check
        run: uv run ty check

  tests:
    name: Phase 2 tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group test

      - name: Run tests
        run: uv run pytest

  coverage:
    name: Phase 3 coverage and Codecov (Python 3.11)
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group test --group coverage

      - name: Run coverage
        run: uv run pytest --cov=nwau_py --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
