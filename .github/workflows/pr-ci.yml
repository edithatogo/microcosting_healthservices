name: PR CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review (GitHub)
    runs-on: ubuntu-latest
    # Keep this job scoped to pull_request only.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml
          fail-on-severity: high


  quality:
    name: Phase 1 quality checks (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group dev --group typing

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Run type check
        run: uv run ty check

  security:
    name: Security checks (bandit + dependency audit + secret-prone patterns)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group dev --group typing

      - name: Validate security-focused Ruff rules
        run: uv run ruff check --select S .

      - name: Run bandit security analysis
        run: uv run --with bandit bandit -r nwau_py scripts -x tests

      - name: Run dependency audit
        run: uv run --with pip-audit pip-audit

  tests:
    name: Phase 2 tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group test

      - name: Run tests
        run: uv run pytest

  rust:
    name: Phase 3 Rust checks
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  coverage:
    name: Phase 3 coverage and Codecov (Python 3.11)
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - rust
      - security
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync environment
        run: uv sync --locked --group test --group coverage

      - name: Run coverage
        run: uv run pytest --cov=nwau_py --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  slow_validation:
    name: Optional slow validation (PR label: run-slow-validation / run-slow-validation-required)
    if: ${{ github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'run-slow-validation') || contains(github.event.pull_request.labels.*.name, 'run-slow-validation-required')) }}
    needs:
      - coverage
    uses: ./.github/workflows/slow-validation.yml
    continue-on-error: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'run-slow-validation-required') }}
