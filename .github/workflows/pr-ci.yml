name: PR CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    name: Dependency review (GitHub)
    runs-on: ubuntu-latest
    # Keep this job scoped to pull_request only.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml
          fail-on-severity: high


  quality:
    name: Phase 1 quality checks (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync environment
        run: uv sync --locked --group dev --group typing --group security

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Run docstring lint
        run: uv run ruff check --select D2 --extend-exclude tests --extend-exclude helpers nwau_py excel_calculator/src

      - name: Run type check
        run: uv run ty check --error all

  security:
    name: Security checks (bandit + dependency audit + secret-prone patterns)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync environment
        run: uv sync --locked --group dev --group typing

      - name: Validate security-focused Ruff rules
        run: uv run ruff check --select S .

      - name: Run bandit security analysis
        run: uv run bandit -r nwau_py scripts -x tests

      - name: Run dependency audit
        run: uv run pip-audit

  tests:
    name: Phase 2 tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust acute binding extension
        run: |
          cd rust/crates/nwau-py
          uv run --with maturin maturin develop --release

      - name: Sync environment
        run: uv sync --locked --group test

      - name: Run tests
        run: uv run pytest

  wheel_build:
    name: Cross-platform maturin wheel build + binding smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build maturin wheel
        run: |
          set -euo pipefail
          cd rust/crates/nwau-py
          uv run --with maturin maturin build --release --out ../../../dist

      - name: Install built wheel into an isolated environment
        run: |
          set -euo pipefail
          python -m venv .venv-wheel
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            wheel_python=".venv-wheel/Scripts/python.exe"
          else
            wheel_python=".venv-wheel/bin/python"
          fi
          wheel_path="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          if [[ -z "$wheel_path" ]]; then
            echo "No wheel artifact found in dist/."
            exit 1
          fi
          "$wheel_python" -m pip install --upgrade pip
          "$wheel_python" -m pip install --no-deps "$wheel_path"

      - name: Smoke test Rust binding from the installed wheel
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            wheel_python=".venv-wheel/Scripts/python.exe"
          else
            wheel_python=".venv-wheel/bin/python"
          fi
          "$wheel_python" - <<'PY'
          from nwau_py import rust_bridge

          module = rust_bridge.load_rust_extension()
          print(module.kernel_label())
          PY

  rust:
    name: Phase 3 Rust checks
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  coverage:
    name: Phase 3 coverage and Codecov (Python 3.11)
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - rust
      - security
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust acute binding extension
        run: |
          cd rust/crates/nwau-py
          uv run --with maturin maturin develop --release

      - name: Sync environment
        run: uv sync --locked --group test --group coverage

      - name: Run coverage
        run: uv run pytest --cov=nwau_py --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          use_oidc: true

  slow_validation:
    name: "Slow validation (PR label: run-slow-validation-required)"
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-slow-validation-required') }}
    needs:
      - coverage
    uses: ./.github/workflows/slow-validation-reusable.yml
