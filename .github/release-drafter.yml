name-template: "nwau_py v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking changes"
    labels:
      - "breaking"
  - title: "Features"
    labels:
      - "feature"
      - "docs"
  - title: "Bug fixes"
    labels:
      - "bug"
      - "security"
  - title: "Maintenance"
    labels:
      - "ci"
      - "dependencies"
      - "release"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
template: |
  ## Release summary

  $CHANGES

  ## Validation expectations

  - CI must be green.
  - `ty`, `ruff`, `pytest`, and Rust checks must pass.
  - The published docs site and release notes must match the tagged source.
exclude-labels:
  - "skip-changelog"
version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "bug"
      - "docs"
      - "ci"
      - "dependencies"
      - "security"
tag-prefix: "v"
